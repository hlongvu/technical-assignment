name: seat-reservation

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    volumes:
      - ./infra/postgres/postgres.conf:/etc/postgresql/postgresql.conf:ro
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [backend]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [backend]

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: seatapp
      RABBITMQ_DEFAULT_PASS: seatapp_dev_pw
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks: [backend]

  auth:
    build:
      context: .
      dockerfile: apps/auth/Dockerfile
    env_file: .env
    environment:
      POSTGRES_DB: ${AUTH_DB}
      PORT: ${AUTH_PORT}
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    ports:
      - "4001:4001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4001/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [backend]

  seat-reservation:
    build:
      context: .
      dockerfile: apps/seat-reservation/Dockerfile
    env_file: .env
    environment:
      POSTGRES_DB: ${SEAT_DB}
      PORT: ${SEAT_PORT}
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    ports:
      - "4002:4002"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4002/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [backend]

  payment:
    build:
      context: .
      dockerfile: apps/payment/Dockerfile
    env_file: .env
    environment:
      POSTGRES_DB: ${PAYMENT_DB}
      PORT: ${PAYMENT_PORT}
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    ports:
      - "4003:4003"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4003/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [backend]

  nginx:
    build:
      context: .
      dockerfile: infra/nginx/Dockerfile
    env_file: .env
    ports:
      - "${NGINX_PORT}:8080"
    depends_on:
      auth:             { condition: service_healthy }
      seat-reservation: { condition: service_healthy }
      payment:          { condition: service_healthy }
    networks: [backend]

volumes:
  pgdata:

networks:
  backend:
    driver: bridge
