worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout 65;

  # --- access log with trace id ---
  log_format trace '$remote_addr - $remote_user [$time_local] "$request" '
                   '$status $body_bytes_sent "$http_referer" '
                   '"$http_user_agent" rid=$http_x_request_id';
  access_log /var/log/nginx/access.log trace;

  # --- rate limit zones (Checklist §2.2.3) ---
  limit_req_zone $binary_remote_addr zone=login:10m   rate=10r/m;
  limit_req_zone $binary_remote_addr zone=api:10m     rate=60r/m;
  limit_req_zone $binary_remote_addr zone=webhook:10m rate=100r/m;
  limit_req_status 429;

  # --- upstreams ---
  upstream auth_upstream   { server auth:4001; }
  upstream seat_upstream   { server seat-reservation:4002; }
  upstream payment_upstream{ server payment:4003; }

  server {
    listen 8080;
    server_name _;

    # static front-end (apps/web)
    root /usr/share/nginx/html;
    index index.html;

    # --- security headers (belt to helmet; Checklist §2.2.5) ---
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # --- auth routes ---
    location /api/auth/ {
      limit_req zone=api burst=20 nodelay;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Request-Id $http_x_request_id;
      proxy_pass http://auth_upstream;
    }
    location = /api/auth/login {
      limit_req zone=login burst=5 nodelay;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Request-Id $http_x_request_id;
      proxy_pass http://auth_upstream;
    }

    # --- seat routes ---
    location /api/seats/ {
      limit_req zone=api burst=20 nodelay;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Request-Id $http_x_request_id;
      proxy_buffering off;           # important for SSE
      proxy_cache off;
      proxy_read_timeout 1h;
      proxy_pass http://seat_upstream;
    }

    # --- payment routes ---
    location /api/payment/ {
      limit_req zone=api burst=10 nodelay;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Request-Id $http_x_request_id;
      proxy_pass http://payment_upstream;
    }
    # Webhook gets its own zone (higher burst tolerance for PSP retries)
    location = /api/payment/webhook {
      limit_req zone=webhook burst=20 nodelay;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Request-Id $http_x_request_id;
      proxy_pass http://payment_upstream;
    }

    # --- front-end ---
    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
