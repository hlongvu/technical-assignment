# Postgres config for the assessment.
# Mount as /etc/postgresql/postgresql.conf via docker-compose command.
# Checklist §1.2.5: slow query logging + lock wait visibility.

# --- connections ---
max_connections = 100

# --- logging ---
log_min_duration_statement = 200ms
log_lock_waits = on
deadlock_timeout = 1s
log_line_prefix = '%m [%p] %q%u@%d '
log_checkpoints = on
log_connections = off
log_disconnections = off

# --- planner / wal ---
shared_buffers = 128MB
work_mem = 4MB
max_wal_size = 1GB
